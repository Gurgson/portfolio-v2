# VPS: Caddy (reverse proxy + auto-HTTPS) + portfolio (Next).
# Postgres działa NATYWNIE na hoście (nie w Dockerze). Portfolio łączy się do
# niego przez host.docker.internal (patrz extra_hosts) — DATABASE_URL w ../.env.
# czytnik.jstapinski.eu: statyczny placeholder serwowany przez Caddy.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - ./czytnik:/srv/czytnik:ro,Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - portfolio
    networks:
      - web

  portfolio:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env # DATABASE_URL (app, read-only, @host.docker.internal) itd.
    environment:
      NODE_ENV: production
    # Dostęp z kontenera do natywnego Postgresa na hoście.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - web
    # brak publish portów — ruch idzie przez Caddy (portfolio:3000)

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
