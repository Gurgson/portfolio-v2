# VPS: Caddy (reverse proxy + auto-HTTPS Let's Encrypt) + portfolio (Next).
# DB: na razie Neon (DATABASE_URL w ../.env). Lokalny Postgres dodamy później.
# czytnik.jstapinski.eu: statyczny placeholder serwowany przez Caddy.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - ./czytnik:/srv/czytnik:ro,Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - portfolio
    networks:
      - web

  portfolio:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env # DATABASE_URL (Neon) itd.
    environment:
      NODE_ENV: production
    networks:
      - web
    # brak publish portów — ruch idzie przez Caddy (portfolio:3000)

networks:
  web:

volumes:
  caddy_data:
  caddy_config:
