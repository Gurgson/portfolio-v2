<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Czytnik — wkrótce</title>
    <style>
      :root {
        color-scheme: dark light;
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
        background: radial-gradient(circle at 30% 20%, #1b2333, #0c0f16 70%);
        color: #e8ecf3;
        padding: 2rem;
        text-align: center;
      }
      .box {
        max-width: 32rem;
      }
      .tag {
        display: inline-block;
        font-size: 0.8rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #7aa2ff;
        border: 1px solid #2a3550;
        border-radius: 999px;
        padding: 0.35rem 0.9rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: clamp(2rem, 6vw, 3.25rem);
        line-height: 1.1;
        margin-bottom: 1rem;
      }
      p {
        color: #a7b1c4;
        line-height: 1.6;
      }
      a {
        color: #7aa2ff;
      }
      .foot {
        margin-top: 2.5rem;
        font-size: 0.85rem;
        color: #6b7688;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <span class="tag">W budowie</span>
      <h1>Czytnik</h1>
      <p>
        Aplikacja jest w trakcie tworzenia. Zajrzyj wkrótce — a tymczasem
        sprawdź moje portfolio na
        <a href="https://jstapinski.eu">jstapinski.eu</a>.
      </p>
      <p class="foot">© Jakub Stapiński</p>
    </div>
  </body>
</html>
